<IfModule mod_ssl.c>
	<VirtualHost _default_:443>
		ServerAdmin rcmurray@andrew.cmu.edu
		ServerName bazaar.lti.cs.cmu.edu

		<Location />
		  Require all granted
		</Location>

		SSLEngine On
		SSLCertificateFile      /etc/ssl/certs/bazaar-lti-cs-cmu-edu_cert.crt
		SSLCertificateKeyFile   /etc/ssl/private/bazaar-lti-cs-cmu-edu_key.pem
		SSLCertificateChainFile /etc/ssl/certs/bazaar-lti-cs-cmu-edu_interm.crt

		RewriteEngine On
		RewriteCond &{REQUEST_URI}  ^/socket.io                    [NC]
		RewriteCond &{QUERY_STRING} transport=websocket            [NC]
		RewriteRule /(baz*.*)       ws://localhost:8300/$1         [P,L]

		RewriteCond %{HTTP:Upgrade} "(?i)websocket"                [NC]
		RewriteRule /(baz*.*)       ws://localhost:8300/$1         [P,L]

		ProxyPass        /bazsocket http://localhost:8300/bazsocket
		ProxyPassReverse /bazsocket http://localhost:8300/bazsocket

		ProxyPass        /krush/    http://localhost:8302/krush/
		ProxyPassReverse /krush/    http://localhost:8302/krush/

		ProxyPass        /test_ws/ws  ws://localhost:8765/test_ws/ws
		ProxyPassReverse /test_ws/ws  ws://localhost:8765/test_ws/ws

		ProxyPass        /test_ws/    http://localhost:8765/test_ws/
		ProxyPassReverse /test_ws/    http://localhost:8765/test_ws/

		ProxyPass        /vlab-api   http://localhost:8305
		ProxyPassReverse /vlab-api   http://localhost:8305

		##################################################################
		# Bazaar camera endpoints — port 8300 (Bazaar Docker server)
		# MUST appear BEFORE the generic /bazaar rule so Apache matches
		# the longer prefix first.
		ProxyPass        /bazaar/api/camera/frame   http://localhost:8300/bazaar/api/camera/frame   nocanon
		ProxyPassReverse /bazaar/api/camera/frame   http://localhost:8300/bazaar/api/camera/frame

		ProxyPass        /bazaar/api/camera/session http://localhost:8300/bazaar/api/camera/session nocanon
		ProxyPassReverse /bazaar/api/camera/session http://localhost:8300/bazaar/api/camera/session

		ProxyPass        /bazaar/api/camera/health  http://localhost:8300/bazaar/api/camera/health  nocanon
		ProxyPassReverse /bazaar/api/camera/health  http://localhost:8300/bazaar/api/camera/health
		##################################################################


		##################################################################
		# Bazaar static camera page — port 8300
		# Same reason as the camera API rules above: the generic /bazaar
		# rule below strips the /bazaar prefix before forwarding, but
		# Express's app.get('/bazaar/static/*', ...) route expects the
		# full path intact. Confirmed via curl: localhost:8300/bazaar/static/
		# works directly, localhost:8300/static/ (the stripped form) hangs.
		ProxyPass        /bazaar/static/  http://localhost:8300/bazaar/static/  nocanon
		ProxyPassReverse /bazaar/static/  http://localhost:8300/bazaar/static/
		##################################################################


		##################################################################
		# Bazaar
		ProxyPass        /bazaar http://localhost:8300
		ProxyPassReverse /bazaar http://localhost:8300

		ProxyPass        /lobby http://localhost:8400
		ProxyPassReverse /lobby http://localhost:8400
		##################################################################


		ProxyPass        /mm http://localhost:49999
		ProxyPassReverse /mm http://localhost:49999

		ProxyPass        /mmsocket http://localhost:49999/mmsocket
		ProxyPassReverse /mmsocket http://localhost:49999/mmsocket

		ProxyPass        /test_server http://localhost:8301
		ProxyPassReverse /test_server http://localhost:8301


		##################################################################
		# LOBBY 

		ProxyPass        /getJupyterlabUrl http://localhost:5000/getJupyterlabUrl
		ProxyPassReverse /getJupyterlabUrl http://localhost:5000/getJupyterlabUrl

		ProxyPass        /targetUsers http://localhost:5000/targetUsers
		ProxyPassReverse /targetUsers http://localhost:5000/targetUsers

		ProxyPass        /minUsers http://localhost:5000/minUsers
		ProxyPassReverse /minUsers http://localhost:5000/minUsers

		ProxyPass        /maxUsers http://localhost:5000/maxUsers
		ProxyPassReverse /maxUsers http://localhost:5000/maxUsers

		ProxyPass        /subAssignWait http://localhost:5000/subAssignWait
		ProxyPassReverse /subAssignWait http://localhost:5000/subAssignWait

		ProxyPass        /roomNum http://localhost:5000/roomNum
		ProxyPassReverse /roomNum http://localhost:5000/roomNum

		ProxyPass        /giveUpWait http://localhost:5000/giveUpWait
		ProxyPassReverse /giveUpWait http://localhost:5000/giveUpWait

		ProxyPass        /maxRoomAge http://localhost:5000/maxRoomAge
		ProxyPassReverse /maxRoomAge http://localhost:5000/maxRoomAge

		ProxyPass        /requestPrefix http://localhost:5000/requestPrefix
		ProxyPassReverse /requestPrefix http://localhost:5000/requestPrefix

		ProxyPass        /namespace http://localhost:5000/namespace
		ProxyPassReverse /namespace http://localhost:5000/namespace

		ProxyPass        /dbServer http://localhost:5000/dbServer
		ProxyPassReverse /dbServer http://localhost:5000/dbServer

		ProxyPass        /notifyDB http://localhost:5000/notifyDB
		ProxyPassReverse /notifyDB http://localhost:5000/notifyDB

		ProxyPass        /deleteRoom http://localhost:5000/deleteRoom
		ProxyPassReverse /deleteRoom http://localhost:5000/deleteRoom

		ProxyPass        /deleteUser http://localhost:5000/deleteUser
		ProxyPassReverse /deleteUser http://localhost:5000/deleteUser

		ProxyPass        /moduleSlug http://localhost:5000/moduleSlug
		ProxyPassReverse /moduleSlug http://localhost:5000/moduleSlug

		ProxyPass        /printRooms http://localhost:5000/printRooms
		ProxyPassReverse /printRooms http://localhost:5000/printRooms

		ProxyPass        /help http://localhost:5000/help
		ProxyPassReverse /help http://localhost:5000/help
		##################################################################


		##################################################################
		##### JupyterLab - Bazaar - Chat Activity Server

		ProxyPass        /activity http://localhost:3000
		ProxyPassReverse /activity http://localhost:3000

		ProxyPass        /dashboard http://localhost:8100/dashboard
		ProxyPassReverse /dashboard http://localhost:8100/dashboard

		ProxyPass        /docs           http://localhost:8100/docs
		ProxyPassReverse /docs           http://localhost:8100/docs

		# Download endpoints — main.py registers these with path parameters
		# (/download-roster/{activity_id}, /download-scores/{activity_id},
		#  /download/{activity_id}/{email}, /download-feedback/{activity_id}/{email})
		# so we proxy the prefix and let the full path flow through with nocanon.
		ProxyPass        /download-roster/    http://localhost:8100/download-roster/    nocanon
		ProxyPassReverse /download-roster/    http://localhost:8100/download-roster/

		ProxyPass        /download-scores/    http://localhost:8100/download-scores/    nocanon
		ProxyPassReverse /download-scores/    http://localhost:8100/download-scores/

		ProxyPass        /download-feedback/  http://localhost:8100/download-feedback/  nocanon
		ProxyPassReverse /download-feedback/  http://localhost:8100/download-feedback/

		ProxyPass        /download/           http://localhost:8100/download/           nocanon
		ProxyPassReverse /download/           http://localhost:8100/download/

		# CORS for /api — allows fetch() from bazaar & bree portals PLUS collab JupyterLab
		<Location /api>
		   SetEnvIf Origin "^https://(bazaar|bree|collab)\.lti\.cs\.cmu\.edu$" CORS_ORIGIN=$0
		   Header always set Access-Control-Allow-Origin "%{CORS_ORIGIN}e" env=CORS_ORIGIN
		   Header always set Access-Control-Allow-Methods "POST, GET, OPTIONS, DELETE, PUT, PATCH"
		   Header always set Access-Control-Allow-Headers "Content-Type, Authorization"
		   Header always set Vary "Origin"
		   RewriteEngine On
		   RewriteCond %{REQUEST_METHOD} OPTIONS
		   RewriteRule ^ - [R=204,L]
		</Location>

		# LearnVia API routes — MUST come before the generic /api rule below.
		# These are requested as absolute /api/... paths by app.js at /learnvia/.
		ProxyPass        /api/camera/          http://localhost:3500/api/camera/          nocanon
		ProxyPassReverse /api/camera/          http://localhost:3500/api/camera/
		ProxyPass        /api/health           http://localhost:3500/api/health           nocanon
		ProxyPassReverse /api/health           http://localhost:3500/api/health
		ProxyPass        /api/problems         http://localhost:3500/api/problems         nocanon
		ProxyPassReverse /api/problems         http://localhost:3500/api/problems
		ProxyPass        /api/answers          http://localhost:3500/api/answers          nocanon
		ProxyPassReverse /api/answers          http://localhost:3500/api/answers
		ProxyPass        /api/chat             http://localhost:3500/api/chat             nocanon
		ProxyPassReverse /api/chat             http://localhost:3500/api/chat
		ProxyPass        /api/sessions/        http://localhost:3500/api/sessions/        nocanon
		ProxyPassReverse /api/sessions/        http://localhost:3500/api/sessions/
		ProxyPass        /api/frames/          http://localhost:3500/api/frames/          nocanon
		ProxyPassReverse /api/frames/          http://localhost:3500/api/frames/
		ProxyPass        /api/session-reports/ http://localhost:3500/api/session-reports/ nocanon
		ProxyPassReverse /api/session-reports/ http://localhost:3500/api/session-reports/
		ProxyPass        /api/agent/           http://localhost:3500/api/agent/           nocanon
		ProxyPassReverse /api/agent/           http://localhost:3500/api/agent/
		##################################################################

		# Activity server API catch-all — all remaining /api/* go to port 8100.
		# Covers: /api/submit, /api/user/*, /api/activity/*, /api/activities,
		#         /api/instructor, /api/grade/*, /api/score, /api/dashboard-cards
		ProxyPass        /api/  http://localhost:8100/api/  nocanon
		ProxyPassReverse /api/  http://localhost:8100/api/
		##################################################################


		##################################################################

		##################################################################
		# LearnVia app (port 3500)
		# WebSocket — camera.js and app.js both connect to window.location.host/ws
		RewriteCond %{HTTP:Upgrade} "(?i)websocket" [NC]
		RewriteRule ^/ws$ ws://localhost:3500/ws [P,L]

		ProxyPass        /ws ws://localhost:3500/ws
		ProxyPassReverse /ws ws://localhost:3500/ws

		# /camera/ — phone camera page
		ProxyPass        /camera/ http://localhost:3500/ nocanon
		ProxyPassReverse /camera/ http://localhost:3500/

		# /learnvia/ — main practice page (Apache strips prefix; Express sees /)
		ProxyPass        /learnvia/ http://localhost:3500/ nocanon
		ProxyPassReverse /learnvia/ http://localhost:3500/
		##################################################################


		##################################################################
		ProxyPass        /interactive_reflection_prompts http://localhost:1248/interactive_reflection_prompts
		ProxyPassReverse /interactive_reflection_prompts http://localhost:1248/interactive_reflection_prompts

		ProxyPass        /essay-islands http://localhost:8003/static/mapper.html
		ProxyPassReverse /essay-islands http://localhost:8003/static/mapper.html
		##################################################################

		# Available loglevels: trace8, ..., trace1, debug, info, notice, warn,
		# error, crit, alert, emerg.
		# It is also possible to configure the loglevel for particular
		# modules, e.g.
		# LogLevel info ssl:warn
		LogLevel warn
		ErrorLog  ${APACHE_LOG_DIR}/bazaar-lobby-error.log
		CustomLog ${APACHE_LOG_DIR}/bazaar-lobby-access.log combined

		# For most configuration files from conf-available/, which are
		# enabled or disabled at a global level, it is possible to
		# include a line for only one particular virtual host. For example the
		# following line enables the CGI configuration for this host only
		# after it has been globally disabled with "a2disconf".
		#Include conf-available/serve-cgi-bin.conf

		#   SSL Engine Switch:
		#   Enable/Disable SSL for this virtual host.
		# SSLEngine on

		#   A self-signed (snakeoil) certificate can be created by installing
		#   the ssl-cert package. See
		#   /usr/share/doc/apache2/README.Debian.gz for more info.
		#   If both key and certificate are stored in the same file, only the
		#   SSLCertificateFile directive is needed.

		#   Server Certificate Chain:
		#   Point SSLCertificateChainFile at a file containing the
		#   concatenation of PEM encoded CA certificates which form the
		#   certificate chain for the server certificate. Alternatively
		#   the referenced file can be the same as SSLCertificateFile
		#   when the CA certificates are directly appended to the server
		#   certificate for convinience.
		#SSLCertificateChainFile /etc/apache2/ssl.crt/server-ca.crt

		#   Certificate Authority (CA):
		#   Set the CA certificate verification path where to find CA
		#   certificates for client authentication or alternatively one
		#   huge file containing all of them (file must be PEM encoded)
		#   Note: Inside SSLCACertificatePath you need hash symlinks
		#		 to point to the certificate files. Use the provided
		#		 Makefile to update the hash symlinks after changes.
		#SSLCACertificatePath /etc/ssl/certs/
		#SSLCACertificateFile /etc/apache2/ssl.crt/ca-bundle.crt

		#   Certificate Revocation Lists (CRL):
		#   Set the CA revocation path where to find CA CRLs for client
		#   authentication or alternatively one huge file containing all
		#   of them (file must be PEM encoded)
		#   Note: Inside SSLCARevocationPath you need hash symlinks
		#		 to point to the certificate files. Use the provided
		#		 Makefile to update the hash symlinks after changes.
		#SSLCARevocationPath /etc/apache2/ssl.crl/
		#SSLCARevocationFile /etc/apache2/ssl.crl/ca-bundle.crl

		#   Client Authentication (Type):
		#   Client certificate verification type and depth.  Types are
		#   none, optional, require and optional_no_ca.  Depth is a
		#   number which specifies how deeply to verify the certificate
		#   issuer chain before deciding the certificate is not valid.
		#SSLVerifyClient require
		#SSLVerifyDepth  10

		#   SSL Engine Options:
		#   Set various options for the SSL engine.
		#   o FakeBasicAuth:
		#	 Translate the client X.509 into a Basic Authorisation.  This means that
		#	 the standard Auth/DBMAuth methods can be used for access control.  The
		#	 user name is the `one line' version of the client's X.509 certificate.
		#	 Note that no password is obtained from the user. Every entry in the user
		#	 file needs this password: `xxj31ZMTZzkVA'.
		#   o ExportCertData:
		#	 This exports two additional environment variables: SSL_CLIENT_CERT and
		#	 SSL_SERVER_CERT. These contain the PEM-encoded certificates of the
		#	 server (always existing) and the client (only existing when client
		#	 authentication is used). This can be used to import the certificates
		#	 into CGI scripts.
		#   o StdEnvVars:
		#	 This exports the standard SSL/TLS related `SSL_*' environment variables.
		#	 Per default this exportation is switched off for performance reasons,
		#	 because the extraction step is an expensive operation and is usually
		#	 useless for serving static content. So one usually enables the
		#	 exportation for CGI and SSI requests only.
		#   o OptRenegotiate:
		#	 This enables optimized SSL connection renegotiation handling when SSL
		#	 directives are used in per-directory context.
		#SSLOptions +FakeBasicAuth +ExportCertData +StrictRequire
		<FilesMatch "\.(cgi|shtml|phtml|php)$">
			SSLOptions +StdEnvVars
		</FilesMatch>
		<Directory /usr/lib/cgi-bin>
			SSLOptions +StdEnvVars
		</Directory>

		#   SSL Protocol Adjustments:
		#   The safe and default but still SSL/TLS standard compliant shutdown
		#   approach is that mod_ssl sends the close notify alert but doesn't wait for
		#   the close notify alert from client. When you need a different shutdown
		#   approach you can use one of the following variables:
		#   o ssl-unclean-shutdown:
		#	 This forces an unclean shutdown when the connection is closed, i.e. no
		#	 SSL close notify alert is send or allowed to received.  This violates
		#	 the SSL/TLS standard but is needed for some brain-dead browsers. Use
		#	 this when you receive I/O errors because of the standard approach where
		#	 mod_ssl sends the close notify alert.
		#   o ssl-accurate-shutdown:
		#	 This forces an accurate shutdown when the connection is closed, i.e. a
		#	 SSL close notify alert is send and mod_ssl waits for the close notify
		#	 alert of the client. This is 100% SSL/TLS standard compliant, but in
		#	 practice often causes hanging connections with brain-dead browsers. Use
		#	 this only for browsers where you know that their SSL implementation
		#	 works correctly.
		#   Notice: Most problems of broken clients are also related to the HTTP
		#   keep-alive facility, so you usually additionally want to disable
		#   keep-alive for those clients, too. Use variable "nokeepalive" for this.
		#   Similarly, one has to force some clients to use HTTP/1.0 to workaround
		#   their broken HTTP/1.1 implementation. Use variables "downgrade-1.0" and
		#   "force-response-1.0" for this.
		# BrowserMatch "MSIE [2-6]" \
		#	nokeepalive ssl-unclean-shutdown \
		#	downgrade-1.0 force-response-1.0

	</VirtualHost>
</IfModule>

# vim: syntax=apache ts=4 sw=4 sts=4 sr noet